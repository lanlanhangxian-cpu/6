name: Build Kernel OPPO K10x PGGM10 SM6375 ColorOS14 KSU
on:
  workflow_call:
  workflow_dispatch:
env:
  PYTHON_VERSION: "3"
  PACK_METHOD: "Anykernel3"
  KERNELSU_METHOD: "shell"
  PATCHES_SOURCE: "author/source"
  PATCHES_BRANCH: "main"
  HOOK_METHOD: "normal"
  HOOK_OLDER: "false"
  PROFILE_NAME: "PGGM10_cos14_a14.env"
  KERNELSU_SUS_PATCH: "false"
  KPM_ENABLE: "false"
  KPM_PATCH_SOURCE: "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU_patch/refs/heads/main/kpm/patch_linux"
  GENERATE_DTB: "true"
  GENERATE_CHIP: "qcom"
  BUILD_DEBUGGER: "true"
  BUILD_OTHER_CONFIG: "false"
  FREE_MORE_SPACE: "true"
  REKERNEL_ENABLE: "false"
  KERNEL_SOURCE: "https://github.com/oppo-source/android_kernel_oppo_sm6375.git"
  KERNEL_BRANCH: "oppo/sm6375_u_14.0.0_k11x_5g"
  VENDOR_DT_SOURCE: "https://github.com/oppo-source/android_kernel_modules_and_devicetree_oppo_sm6375.git"
  VENDOR_DT_BRANCH: "oppo/sm6375_u_14.0.0_k11x_5g"
  OTA_ZIP_URL: "https://dfs-serverauto-in.allawnofs.com/dfs/24/01/16/914e7a6c6c274e629b32b173a6124a64.zip"

jobs:
  build:
    name: Build OPPO K10x Kernel - ${{ github.actor }}
    runs-on: ubuntu-22.04
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
    steps:
      - name: Free Disk Space (Ubuntu)
        if: env.FREE_MORE_SPACE == 'true'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Remove useless tools
        run: |
          sudo rm -rf /opt/hostedtoolcache
          df -h

      - uses: actions/checkout@v4

      - name: Load K10x PGGM10 Profile Config
        run: |
          CONFIG_ENV=$(grep -w "CONFIG_ENV" Profiles/${{ env.PROFILE_NAME }} | head -n 1 | cut -d "=" -f 2)
          CONFIG_LIST=(
              DEVICE_NAME
              DEVICE_CODENAME
              CUSTOM_CMDS
              EXTRA_CMDS
              CLANG_SOURCE
              CLANG_BRANCH
              GCC_GNU
              GCC_64_SOURCE
              GCC_64_BRANCH
              GCC_32_SOURCE
              GCC_32_BRANCH
              DEFCONFIG_SOURCE
              DEFCONFIG_NAME
              DEFCONFIG_ORIGIN_IMAGE
              KERNELSU_SOURCE
              KERNELSU_BRANCH
              KERNELSU_NAME
              SUSFS_ENABLE
              SUSFS_FIXED
              SUSFS_UPDATE
              AK3_SOURCE
              AK3_BRANCH
              BOOT_SOURCE
              LXC_ENABLE
              HAVE_NO_DTBO
              HAVE_NO_DTBO_TOOL
              ROM_TEXT
          )

          for CONFIG in "${CONFIG_LIST[@]}"; do
              if [[ "$CONFIG" == "EXTRA_CMDS" || "$CONFIG" == "CUSTOM_CMDS" ]]; then
                  echo "$CONFIG=$(grep -w "$CONFIG" "$CONFIG_ENV" | head -n 1 | cut -d ":" -f 2)" >> $GITHUB_ENV
              else
                  echo "$CONFIG=$(grep -w "$CONFIG" "$CONFIG_ENV" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
              fi
          done

          mv $GITHUB_WORKSPACE/Patches /tmp/
          mv $GITHUB_WORKSPACE/Bin /tmp/

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 2048
          temp-reserve-mb: 64
          swap-size-mb: 8192
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"
          remove-codeql: "true"

      - name: Install Full Compile Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl libxml-simple-perl bc libc6-dev-i386 lib32ncurses5-dev libx11-dev lib32z-dev libgl1-mesa-dev xsltproc unzip device-tree-compiler p7zip-full zstd python2 python3 -y

      - name: Install System GCC Cross Toolchain (Fallback)
        if: env.GCC_GNU == 'true'
        run: |
          if [ -z ${{ env.GCC_64_SOURCE }} ] && [ -z ${{ env.GCC_32_SOURCE }} ]; then
            sudo apt-get install binutils-aarch64-linux-gnu gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi -y
            echo "GCC_64=CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV
            echo "GCC_32=CROSS_COMPILE_ARM32=arm-linux-gnueabi-" >> $GITHUB_ENV
          else
            echo "Using custom GCC toolchain, skip system GCC install"
          fi

      - name: Auto Download OTA Zip & Extract boot.img via payload-dumper-go
        run: |
          echo "Download OTA firmware zip..."
          wget -O ota.zip "${{ env.OTA_ZIP_URL }}"
          unzip -q ota.zip
          echo "Download payload-dumper-go binary"
          wget https://github.com/ssut/payload-dumper-go/releases/download/1.2.2/payload-dumper-go_1.2.2_linux_amd64.tar.gz
          tar -zxvf payload-dumper-go_1.2.2_linux_amd64.tar.gz
          chmod +x payload-dumper-go
          echo "Extract boot.img from payload.bin"
          ./payload-dumper-go -partitions boot payload.bin
          mv extracted/boot.img ./boot.img
          ls -lh boot.img
          echo "boot.img extract success!"

      - name: Clone Main Kernel + Vendor DeviceTree & Modules Merge
        run: |
          echo "Clone SM6375 main kernel source"
          git clone ${{ env.KERNEL_SOURCE }} -b ${{ env.KERNEL_BRANCH }} kernel --depth=1
          echo "Clone vendor dt & kernel modules repo"
          git clone ${{ env.VENDOR_DT_SOURCE }} -b ${{ env.VENDOR_DT_BRANCH }} vendor_dt --depth=1
          echo "Merge vendor driver & device tree into kernel source tree"
          cp -r vendor_dt/* kernel/
          rm -rf vendor_dt
          echo "Kernel + Vendor DT merge completed"

      - name: Setup Clang & GCC Cross Compile Toolchain
        run: |
          cd $GITHUB_WORKSPACE
          cp /tmp/Bin/found_gcc.sh ./

          # 64bit GCC Toolchain
          if [[ "${{ env.CLANG_SOURCE }}" == *proton* ]]; then
            echo "Proton Clang detected, use system aarch64 gcc"
            GCC_64_BIN=aarch64-linux-gnu-
            echo "GCC_64=CROSS_COMPILE=$GCC_64_BIN" >> $GITHUB_ENV
          elif [ -n "${{ env.GCC_64_SOURCE }}" ]; then
            if [[ "${{ env.GCC_64_SOURCE }}" == *".git" ]]; then
              git clone ${{ env.GCC_64_SOURCE }} -b ${{ env.GCC_64_BRANCH }} gcc-64 --depth=1
            elif [[ "${{ env.GCC_64_SOURCE }}" == *'.tar.gz' ]]; then
              wget -O gcc-64.tar.gz ${{ env.GCC_64_SOURCE }}
              mkdir gcc-64 && tar -C gcc-64/ -zxvf gcc-64.tar.gz
            elif [[ "${{ env.GCC_64_SOURCE }}" == *'.tar.xz' ]]; then
              wget -O gcc-64.tar.xz ${{ env.GCC_64_SOURCE }}
              mkdir gcc-64 && tar -C gcc-64/ -xvf gcc-64.tar.xz --strip-components 1
            elif [[ "${{ env.GCC_64_SOURCE }}" == *'.zip' ]]; then
              wget -O gcc-64.zip ${{ env.GCC_64_SOURCE }}
              mkdir gcc-64 && unzip gcc-64.zip -d gcc-64/
            fi
            bash found_gcc.sh GCC_64
          fi

          # 32bit ARM GCC Toolchain
          if [[ "${{ env.CLANG_SOURCE }}" == *proton* ]]; then
            echo "Proton Clang detected, use system arm gcc"
            GCC_32_BIN=arm-linux-gnueabi-
            echo "GCC_32=CROSS_COMPILE_ARM32=$GCC_32_BIN" >> $GITHUB_ENV
          elif [ -n "${{ env.GCC_32_SOURCE }}" ]; then
            if [[ "${{ env.GCC_32_SOURCE }}" == *".git" ]]; then
              git clone ${{ env.GCC_32_SOURCE }} -b ${{ env.GCC_32_BRANCH }} gcc-32 --depth=1
            elif [[ "${{ env.GCC_32_SOURCE }}" == *'.tar.gz' ]]; then
              wget -O gcc-32.tar.gz ${{ env.GCC_32_SOURCE }}
              mkdir gcc-32 && tar -C gcc-32/ -zxvf gcc-32.tar.gz
            elif [[ "${{ env.GCC_32_SOURCE }}" == *'.tar.xz' ]]; then
              wget -O gcc-32.tar.xz ${{ env.GCC_32_SOURCE }}
              mkdir gcc-32 && tar -C gcc-32/ -xvf gcc-32.tar.xz --strip-components 1
            elif [[ "${{ env.GCC_32_SOURCE }}" == *'.zip' ]]; then
              wget -O gcc-32.zip ${{ env.GCC_32_SOURCE }}
              mkdir gcc-32 && unzip gcc-32.zip -d gcc-32/
            fi
            if [ -z "${{ env.GCC_64_SOURCE }}" ]; then
              bash found_gcc.sh GCC_32_ONLY
            else
              bash found_gcc.sh GCC_32
            fi
          fi

# 自定义 Clang 工具链
如果 [[ "${{ env.CLANG_SOURCE }}" == *".git" ]]；则
            git clone ${{ env.CLANG_SOURCE }} -b ${{ env.CLANG_BRANCH }} clang-custom --depth=1
elif[[ "${{ env.CLANG_SOURCE }}" == *'.tar.gz' ]];
            wget -O clang.tar.gz ${{ env.CLANG_SOURCE }}
创建 clang-custom 目录
            tar -C clang-custom/ -zxvf clang.tar.gz
elif["${{ env.CLANG_SOURCE }}"== *'.tar.xz']];
            wget -O clang.tar.xz ${{ env.CLANG_SOURCE }}
创建 clang-custom 目录
            tar -C clang-custom/ -xvf clang.tar.xz --strip-components 1
elif["${{ env.CLANG_SOURCE }}"== *'.zip']];
            wget -O clang.zip ${{ env.CLANG_SOURCE }}
创建 clang-custom 目录
将 clang.zip 解压到 clang-custom/ 目录下
          fi
