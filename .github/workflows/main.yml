name: Build K10x ReSukiSU+SUSFS (基于 Rancemxn 内核)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libncurses-dev flex bison bc git

      - name: 克隆 Rancemxn 的内核（已包含 SUSFS v2.0.0）
        run: |
          git clone --depth=1 https://github.com/Rancemxn/android_kernel_oppo_sm6375 kernel
          cd kernel

      - name: 修复缺失的内核配置片段（从官方模块仓库补齐 sched_assist 等）
        run: |
          cd kernel
          echo "从官方模块仓库拉取完整 kernel/ 配置片段..."
          git clone -b oppo/sm6375_u_14.0.0_k10x_5g --depth=1 \
            https://github.com/oppo-source/android_kernel_modules_and_devicetree_oppo_sm6375 tmp_repo
          # 复制缺失的 kernel 目录（如 sched_assist）
          if [ -d tmp_repo/kernel ]; then
            cp -r tmp_repo/kernel/* kernel/ 2>/dev/null || true
            echo "已恢复 kernel/ 下的配置片段"
          fi
          # 强制覆盖 defconfig（保证使用 K10x 官方配置）
          if [ -d tmp_repo/arch/arm64/configs ]; then
            mkdir -p arch/arm64/configs
            cp -rf tmp_repo/arch/arm64/configs/* arch/arm64/configs/
            echo "已强制更新 defconfig"
          fi
          # 设备树也一起复制
          if [ -d tmp_repo/arch/arm64/boot/dts ]; then
            mkdir -p arch/arm64/boot/dts
            cp -r tmp_repo/arch/arm64/boot/dts/* arch/arm64/boot/dts/
          fi
          rm -rf tmp_repo

      - name: 集成 ReSukiSU 内核驱动
        run: |
          cd kernel
          rm -rf drivers/kernelsu
          git clone --depth=1 -n https://github.com/ReSukiSU/ReSukiSU re_src
          cd re_src
          git fetch origin 27c41151cfcfd37f7db336332c6c573429a656d0
          git checkout FETCH_HEAD
          cd ..
          mkdir -p drivers/kernelsu
          cp -r re_src/kernel/* drivers/kernelsu/
          rm -rf re_src
          if ! grep -q "drivers/kernelsu/Kconfig" drivers/Kconfig; then
            echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig
          fi
          if ! grep -q "kernelsu/" drivers/Makefile; then
            echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          fi

      - name: 编译内核（强制使用 oscar 配置）
        run: |
          cd kernel
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-

          echo "=== 可用 defconfig 列表 ==="
          find arch/arm64/configs/ -name "*_defconfig" -type f | sort

          # 强制使用 vendor 目录下包含 oscar 的配置
          DEFCONFIG=$(find arch/arm64/configs/vendor/ -name "*oscar*_defconfig" -type f 2>/dev/null | head -1)
          if [ -z "$DEFCONFIG" ]; then
            echo "❌ 未找到 oscar defconfig，请确认 vendor 目录内容："
            ls arch/arm64/configs/vendor/ 2>/dev/null || echo "vendor 目录不存在"
            exit 1
          fi
          echo "使用 defconfig: $DEFCONFIG"
          make $(basename "$DEFCONFIG")

          # 设置版本后缀与强制选项
          ./scripts/config --set-str CONFIG_LOCALVERSION "-qgki-gfe724a477a80"
          ./scripts/config --enable CONFIG_KSU
          ./scripts/config --enable CONFIG_KSU_SUSFS
          ./scripts/config --enable CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT
          ./scripts/config --enable CONFIG_KSU_SUSFS_SUS_PATH
          ./scripts/config --enable CONFIG_KSU_SUSFS_SUS_MOUNT
          ./scripts/config --enable CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT
          ./scripts/config --enable CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT

          make olddefconfig
          make -j$(nproc)

      - name: 打包 AnyKernel3
        run: |
          cd kernel
          git clone https://github.com/osm0sis/AnyKernel3
          cp arch/arm64/boot/Image.gz-dtb AnyKernel3/
          if [ -d "$GITHUB_WORKSPACE/official_modules" ]; then
            cp -r $GITHUB_WORKSPACE/official_modules/* AnyKernel3/modules/
          fi
          cd AnyKernel3
          sed -i 's/device.name1=.*/device.name1=oscar/' anykernel.sh
          zip -r9 ../../K10x_ReSukiSU_SUSFS-v2.0.0-$(date +%Y%m%d-%H%M).zip ./*

      - name: 上传刷机包
        uses: actions/upload-artifact@v4
        with:
          name: K10x_ReSukiSU_SUSFS_Kernel
          path: K10x_ReSukiSU_SUSFS-v2.0.0-*.zip
