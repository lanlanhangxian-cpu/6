name: 调试-查看内核目录&defconfig
on:
  workflow_dispatch:
    inputs:
      kernel_repo:
        default: 'https://github.com/oppo-source/android_kernel_oppo_sm6375.git'
      dt_module_repo:
        default: 'https://github.com/oppo-source/android_kernel_modules_and_devicetree_oppo_sm6375.git'
      branch_name:
        default: 'oppo/sm6375_u_14.0.0_k10x_5g'

jobs:
  debug:
    runs-on: ubuntu-22.04
    steps:
      - name: 克隆主内核
        run: |
          git clone --depth=1 --branch ${{ github.event.inputs.branch_name }} ${{ github.event.inputs.kernel_repo }} kernel
      - name: 克隆并合并设备树
        run: |
          git clone --depth=1 --branch ${{ github.event.inputs.branch_name }} ${{ github.event.inputs.dt_module_repo }} kernel_modules
          cp -rf kernel_modules/* kernel/
      - name: 查看内核根目录
        run: pwd && ls -la
        working-directory: ./kernel
      - name: 查看 arch/arm64/configs 下所有 defconfig
        run: ls -la arch/arm64/configs/
        working-directory: ./kernel
