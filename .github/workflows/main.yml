name: Build K10x ReSukiSU+SUSFS Kernel (5.4.233-qgki)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 源码（含 ReSukiSU 驱动与 SUSFS 补丁）
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libncurses-dev flex bison bc

      - name: 编译内核（自动匹配 defconfig + 强制匹配官方版本）
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-

          # 列出所有可用的 defconfig，方便排查
          echo "=== 所有 defconfig 文件 ==="
          find arch/arm64/configs/ -name "*_defconfig" -type f

          # 自动选取 vendor 目录下的第一个 defconfig
          DEFCONFIG=$(find arch/arm64/configs/vendor/ -name "*_defconfig" -type f | head -1)
          if [ -z "$DEFCONFIG" ]; then
            # 如果 vendor 下没有，则尝试根目录的
            DEFCONFIG=$(find arch/arm64/configs/ -maxdepth 1 -name "*_defconfig" -type f | head -1)
          fi
          echo "使用 defconfig: $DEFCONFIG"
          make $(basename "$DEFCONFIG")

          # 强制 LOCALVERSION 等于官方内核版本后缀，保证模块加载
          ./scripts/config --set-str CONFIG_LOCALVERSION "-qgki-gfe724a477a80"
          make olddefconfig
          make -j$(nproc)

      - name: 打包 AnyKernel3（含官方模块）
        run: |
          git clone https://github.com/osm0sis/AnyKernel3

          # 复制内核镜像（高通平台通常是 Image.gz-dtb）
          cp arch/arm64/boot/Image.gz-dtb AnyKernel3/

          # 如果已提前将官方模块放入 official_modules 目录，则一并打包
          if [ -d "official_modules" ]; then
            cp -r official_modules/* AnyKernel3/modules/
          fi

          cd AnyKernel3

          # 设置机型代号为 OPPO K10x (oscar)
          sed -i 's/device.name1=.*/device.name1=oscar/' anykernel.sh

          # 打包，文件名带时间戳
          zip -r9 ../K10x_ReSukiSU_SUSFS-v2.0.0-$(date +%Y%m%d-%H%M).zip ./*

      - name: 上传刷机包
        uses: actions/upload-artifact@v4
        with:
          name: K10x_ReSukiSU_SUSFS_Kernel
          path: K10x_ReSukiSU_SUSFS-v2.0.0-*.zip
