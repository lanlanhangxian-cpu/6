name: OPPO K10x Android14 内核编译 + ResukiSU
on:
  workflow_dispatch:
    inputs:
      kernel_repo:
        description: 内核主仓库地址
        required: true
        default: 'https://github.com/oppo-source/android_kernel_oppo_sm6375.git'
      dt_module_repo:
        description: 设备树&模块仓库地址
        required: true
        default: 'https://github.com/oppo-source/android_kernel_modules_and_devicetree_oppo_sm6375.git'
      branch_name:
        description: 统一分支名(双仓库共用)
        required: true
        default: 'oppo/sm6375_u_14.0.0_k10x_5g'
      defconfig:
        description: 内核配置文件
        required: true
        default: 'sm6375_defconfig'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    env:
      ARCH: arm64
      CROSS_COMPILE: aarch64-linux-gnu-

    steps:
      # 1. 安装编译依赖
      - name: 安装系统依赖
        run: |
          sudo apt update -y
          sudo apt install -y git flex bison build-essential zip curl libncurses5-dev \
          libssl-dev libelf-dev python3 bc rsync lz4 mkbootimg gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      # 2. 克隆主内核源码
      - name: 克隆主内核源码
        run: |
          git clone --depth=1 --branch ${{ github.event.inputs.branch_name }} \
          ${{ github.event.inputs.kernel_repo }} kernel
          cd $GITHUB_WORKSPACE/kernel

      # 3. 克隆设备树 & 驱动模块
      - name: 克隆设备树/模块源码
        run: |
          git clone --depth=1 --branch ${{ github.event.inputs.branch_name }} \
          ${{ github.event.inputs.dt_module_repo }} kernel_modules
          # 合并设备树到内核源码(OPPO 标准目录)
          cp -r kernel_modules/* $GITHUB_WORKSPACE/kernel/

      # 4. 集成 ResukiSU (适配 Android14/5.15 内核)
      - name: 集成 ResukiSU
        run: |
          cd $GITHUB_WORKSPACE/kernel
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash
          echo "CONFIG_KSU=y" >> arch/arm64/configs/${{ github.event.inputs.defconfig }}

      # 5. 加载内核配置
      - name: 加载 defconfig
        run: |
          cd $GITHUB_WORKSPACE/kernel
          make ${{ env.ARCH }} ${{ github.event.inputs.defconfig }}
          sed -i 's/# CONFIG_KSU is not set/CONFIG_KSU=y/' .config

      # 6. 清理编译缓存
      - name: 清理旧产物
        run: |
          cd $GITHUB_WORKSPACE/kernel
          make ${{ env.ARCH }} clean
          make ${{ env.ARCH }} mrproper

      # 7. 正式编译内核
      - name: 编译内核
        run: |
          cd $GITHUB_WORKSPACE/kernel
          make -j$(nproc) ${{ env.ARCH }} CROSS_COMPILE=${{ env.CROSS_COMPILE }}

      # 8. 打包 boot.img
      - name: 生成 boot.img
        run: |
          cd $GITHUB_WORKSPACE/kernel/arch/arm64/boot
          mkbootimg --kernel Image.gz-dtb -o $GITHUB_WORKSPACE/boot.img

      # 9. 上传所有产物
      - name: 上传编译文件
        uses: actions/upload-artifact@v4
        with:
          name: K10x-A14-ResukiSU-Boot_${{ github.event.inputs.branch_name }}
          path: |
            boot.img
            kernel/arch/arm64/boot/Image.gz-dtb
